<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPForge — Accountability Leaderboard</title>
  <meta name="description" content="Gamified productivity system with daily planning, XP scoring, clans, and social accountability leaderboards." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div style="position:absolute;top:24px;right:24px;z-index:99">
    <button class="notif-bell" style="width:40px;height:40px;border:none;background:var(--bg-card);box-shadow:var(--shadow-card)" onclick="toggleTheme()">
      <i class="theme-icon" data-lucide="moon" style="width:20px;height:20px"></i>
    </button>
  </div>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo"><i data-lucide="zap" style="display:inline-block; vertical-align:middle; margin-right:4px; margin-top:-4px"></i> XPForge</div>
      <p class="auth-tagline">Plan. Execute. Dominate the leaderboard.</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-signup">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="form-login">
        <div class="mb-3">
          <label class="form-label-custom">Email</label>
          <input id="login-email" type="email" class="form-control-custom" placeholder="you@example.com" required />
        </div>
        <div class="mb-4">
          <label class="form-label-custom">Password</label>
          <div style="position:relative">
            <input id="login-password" type="password" class="form-control-custom" placeholder="••••••••" required style="padding-right:44px" />
            <button type="button" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:4px;border:none;background:transparent;cursor:pointer" onclick="togglePassword(this, 'login-password')">
              <i data-lucide="eye" style="width:18px;height:18px;color:var(--text-muted)"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form id="form-signup" class="d-none">
        <div class="mb-3">
          <label class="form-label-custom">Username</label>
          <input id="signup-username" type="text" class="form-control-custom" placeholder="BeastMode99" required />
        </div>
        <div class="mb-3">
          <label class="form-label-custom">Email</label>
          <input id="signup-email" type="email" class="form-control-custom" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label-custom">Password</label>
          <div style="position:relative">
            <input id="signup-password" type="password" class="form-control-custom" placeholder="Min. 6 characters" required minlength="6" style="padding-right:44px" />
            <button type="button" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:4px;border:none;background:transparent;cursor:pointer" onclick="togglePassword(this, 'signup-password')">
              <i data-lucide="eye" style="width:18px;height:18px;color:var(--text-muted)"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label-custom">Timezone</label>
          <select id="signup-timezone" class="form-control-custom">
            <option value="UTC">UTC</option>
            <option value="Africa/Lagos">Africa/Lagos (WAT)</option>
            <option value="Africa/Douala">Africa/Douala (WAT)</option>
            <option value="Africa/Nairobi">Africa/Nairobi (EAT)</option>
            <option value="Europe/London">Europe/London (GMT)</option>
            <option value="Europe/Paris">Europe/Paris (CET)</option>
            <option value="America/New_York">America/New_York (EST)</option>
            <option value="America/Los_Angeles">America/Los_Angeles (PST)</option>
            <option value="Asia/Dubai">Asia/Dubai (GST)</option>
            <option value="Asia/Kolkata">Asia/Kolkata (IST)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">Create Account</button>
      </form>

      <!-- Features strip -->
      <div class="d-flex justify-content-center gap-3 mt-4" style="flex-wrap:wrap">
        <span style="font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:4px"><i data-lucide="lock" style="width:14px;height:14px"></i> Daily plan lock</span>
        <span style="font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:4px"><i data-lucide="zap" style="width:14px;height:14px"></i> XP economy</span>
        <span style="font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:4px"><i data-lucide="swords" style="width:14px;height:14px"></i> Clan battles</span>
        <span style="font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:4px"><i data-lucide="trophy" style="width:14px;height:14px"></i> Leaderboards</span>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    lucide.createIcons();
    function togglePassword(btn, inputId) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        btn.innerHTML = '<i data-lucide="eye-off" style="width:18px;height:18px;color:var(--text-muted)"></i>';
      } else {
        input.type = "password";
        btn.innerHTML = '<i data-lucide="eye" style="width:18px;height:18px;color:var(--text-muted)"></i>';
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
