<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPForge — Reset Password</title>
  <meta name="description" content="Reset your XPForge password." />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <i data-lucide="zap" style="display:inline-block;vertical-align:middle;margin-right:4px;margin-top:-4px"></i>
        XPForge
      </div>
      <p class="auth-tagline">Set a new password for your account.</p>

      <!-- Success state (hidden until done) -->
      <div id="success-state" class="d-none text-center" style="padding:20px 0">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(46,204,113,0.15);
            display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <i data-lucide="check-circle" style="width:32px;height:32px;color:var(--success)"></i>
        </div>
        <h3 style="font-family:var(--font-display);font-weight:700;margin-bottom:8px">Password Updated!</h3>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:20px">
          You've been logged in automatically. Redirecting to your dashboard…
        </p>
      </div>

      <!-- Error state (invalid/expired token) -->
      <div id="error-state" class="d-none text-center" style="padding:20px 0">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,79,109,0.15);
            display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <i data-lucide="alert-circle" style="width:32px;height:32px;color:var(--danger)"></i>
        </div>
        <h3 style="font-family:var(--font-display);font-weight:700;margin-bottom:8px">Link Expired</h3>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:20px">
          This reset link is invalid or has expired. Please request a new one.
        </p>
        <a href="/" class="btn btn-primary-custom w-100">Back to Sign In</a>
      </div>

      <!-- Reset form -->
      <form id="form-reset" class="d-none">
        <div class="mb-3">
          <label class="form-label-custom">New Password</label>
          <div style="position:relative">
            <input id="new-password" type="password" class="form-control-custom"
              placeholder="Min. 6 characters" required minlength="6" style="padding-right:44px" />
            <button type="button"
              style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
                     padding:4px;border:none;background:transparent;cursor:pointer"
              onclick="togglePwd(this,'new-password')">
              <i data-lucide="eye" style="width:18px;height:18px;color:var(--text-muted)"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label-custom">Confirm Password</label>
          <input id="confirm-password" type="password" class="form-control-custom"
            placeholder="Repeat your password" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">
          <i data-lucide="lock" style="width:16px;height:16px;margin-right:6px"></i>
          Set New Password
        </button>
      </form>

      <!-- Loading skeleton -->
      <div id="loading-state" class="text-center" style="padding:20px 0">
        <div class="skeleton" style="height:48px;margin-bottom:12px;border-radius:10px"></div>
        <div class="skeleton" style="height:48px;margin-bottom:12px;border-radius:10px"></div>
        <div class="skeleton" style="height:48px;border-radius:10px"></div>
      </div>
    </div>
  </div>

  <script src="/js/offline-queue.js"></script>
  <script src="/js/api.js"></script>
  <script>
    lucide.createIcons();

    const token = new URLSearchParams(window.location.search).get("token");

    document.addEventListener("DOMContentLoaded", () => {
      const loading = document.getElementById("loading-state");
      const form    = document.getElementById("form-reset");
      const errDiv  = document.getElementById("error-state");

      if (!token) {
        loading.classList.add("d-none");
        errDiv.classList.remove("d-none");
        return;
      }

      // Show the form (token will be validated on submit)
      loading.classList.add("d-none");
      form.classList.remove("d-none");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const newPwd  = document.getElementById("new-password").value;
        const confirm = document.getElementById("confirm-password").value;
        if (newPwd !== confirm) {
          showToast("Passwords do not match", "error");
          return;
        }
        const btn = form.querySelector("button[type=submit]");
        setButtonLoading(btn, true);
        try {
          const data = await apiFetch("/api/auth/reset-password", "POST", {
            token, password: newPwd,
          });
          setToken(data.token);
          setUser(data.user);
          form.classList.add("d-none");
          document.getElementById("success-state").classList.remove("d-none");
          setTimeout(() => window.location.href = "/dashboard.html", 2000);
        } catch (err) {
          showToast(err.message, "error");
          setButtonLoading(btn, false, `<i data-lucide="lock" style="width:16px;height:16px;margin-right:6px"></i> Set New Password`);
          lucide.createIcons();
          // If expired/invalid, also show the error section
          if (err.message.includes("expired") || err.message.includes("Invalid")) {
            form.classList.add("d-none");
            errDiv.classList.remove("d-none");
          }
        }
      });
    });

    function togglePwd(btn, inputId) {
      const input = document.getElementById(inputId);
      input.type  = input.type === "password" ? "text" : "password";
      btn.innerHTML = input.type === "text"
        ? '<i data-lucide="eye-off" style="width:18px;height:18px;color:var(--text-muted)"></i>'
        : '<i data-lucide="eye"     style="width:18px;height:18px;color:var(--text-muted)"></i>';
      lucide.createIcons();
    }
  </script>
</body>
</html>
