<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPForge — Notifications</title>
  <meta name="description" content="Your XPForge notifications — clan invites, battle challenges, and activity." />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard.html">
        <i data-lucide="zap" style="display:inline-block;vertical-align:middle;margin-right:4px;width:20px;height:20px"></i>XPForge
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="/dashboard.html" class="nav-link">Today</a>
        <a href="/leaderboard.html" class="nav-link">Leaderboard</a>
        <a href="/clan.html" class="nav-link">Clan</a>
        <a href="/profile.html" class="nav-link">Profile</a>
        <a href="/about.html" class="nav-link">About</a>
        <button class="btn-icon theme-icon-btn" onclick="toggleTheme()" title="Toggle theme">
          <i class="theme-icon" data-lucide="moon" style="width:18px;height:18px"></i>
        </button>
        <div id="nav-avatar"></div>
        <span id="nav-username" style="font-size:.85rem;font-weight:600;color:var(--text-secondary)"></span>
        <button class="btn btn-ghost" id="btn-logout" style="padding:6px 14px;font-size:.85rem">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="page-header d-flex align-items-center gap-3">
      <button onclick="history.back()" class="btn-icon" title="Back">
        <i data-lucide="arrow-left" style="width:20px;height:20px"></i>
      </button>
      <div>
        <h1 style="font-size:1.5rem;margin-bottom:2px">Notifications</h1>
        <p style="margin:0">Your latest alerts, invites, and battle challenges</p>
      </div>
      <button id="btn-mark-all" class="btn btn-ghost ms-auto" style="padding:8px 16px;font-size:.85rem">
        <i data-lucide="check-check" style="width:16px;height:16px;margin-right:4px"></i>Mark all read
      </button>
    </div>

    <!-- Loading skeleton -->
    <div id="notif-page-loading">
      <div class="skeleton" style="height:72px;margin-bottom:12px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;margin-bottom:12px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;margin-bottom:12px;border-radius:14px"></div>
    </div>

    <!-- Notifications list -->
    <div id="notif-page-list" class="d-none"></div>
  </div>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav">
    <a href="/dashboard.html" class="mobile-nav-item">
      <i data-lucide="clipboard-list"></i> Today
    </a>
    <a href="/leaderboard.html" class="mobile-nav-item">
      <i data-lucide="trophy"></i> Board
    </a>
    <a href="/clan.html" class="mobile-nav-item">
      <i data-lucide="swords"></i> Clan
    </a>
    <a href="/profile.html" class="mobile-nav-item">
      <i data-lucide="user"></i> Profile
    </a>
    <a href="/about.html" class="mobile-nav-item">
      <i data-lucide="book-open"></i> About
    </a>
  </nav>

  <script src="/js/offline-queue.js"></script>
  <script src="/js/api.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener("DOMContentLoaded", async () => {
      requireLogin();
      const user = getUser();
      const uEl = document.getElementById("nav-username");
      if (uEl && user) uEl.textContent = user.username;
      const avEl = document.getElementById("nav-avatar");
      if (avEl && user) avEl.innerHTML = renderAvatar(user.username, user.avatar_color, "avatar-sm");

      document.getElementById("btn-logout")?.addEventListener("click", () => {
        clearToken(); window.location.href = "/";
      });

      document.getElementById("btn-mark-all")?.addEventListener("click", async () => {
        const btn = document.getElementById("btn-mark-all");
        setButtonLoading(btn, true);
        try {
          await apiFetch("/api/notifications/read-all", "PATCH");
          await loadNotifications();
          showToast("All marked read", "success");
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          setButtonLoading(btn, false);
        }
      });

      await loadNotifications();
    });

    async function loadNotifications() {
      const loading = document.getElementById("notif-page-loading");
      const list    = document.getElementById("notif-page-list");
      if (loading) loading.style.display = "block";
      if (list) list.classList.add("d-none");

      try {
        const notifs = await apiFetch("/api/notifications");
        renderPageNotifications(notifs || []);
      } catch (err) {
        showToast("Failed to load notifications", "error");
      } finally {
        if (loading) loading.style.display = "none";
        if (list) list.classList.remove("d-none");
      }
    }

    function renderPageNotifications(notifs) {
      const list = document.getElementById("notif-page-list");
      if (!list) return;

      if (!notifs.length) {
        list.innerHTML = `
          <div class="empty-state" style="padding:60px 24px">
            <div class="empty-icon"><i data-lucide="bell-off" style="width:48px;height:48px;color:var(--text-muted)"></i></div>
            <h3>All quiet</h3>
            <p style="color:var(--text-muted)">No notifications yet — go earn some XP!</p>
          </div>`;
        window.lucide.createIcons({ root: list });
        return;
      }

      list.innerHTML = notifs.map(n => {
        const typeIcon = {
          clan_invite:             "users",
          battle_challenge:        "swords",
          overtaken:               "trending-down",
          clan_behind:             "alert-triangle",
          clan_losing:             "shield-alert",
          daily_summary:           "sun",
          peer_activity:           "activity",
          no_tasks_reminder:       "clipboard-list",
          plan_not_locked:         "lock-open",
          tasks_pending_reminder:  "clock",
          reached_top:             "trophy",
        }[n.type] || "bell";

        const typeColor = {
          clan_invite:             "var(--accent-light)",
          battle_challenge:        "var(--danger)",
          overtaken:               "var(--warning)",
          clan_behind:             "var(--danger)",
          clan_losing:             "var(--danger)",
          daily_summary:           "var(--gold)",
          peer_activity:           "var(--success)",
          no_tasks_reminder:       "var(--warning)",
          plan_not_locked:         "var(--warning)",
          tasks_pending_reminder:  "var(--accent-light)",
          reached_top:             "var(--gold)",
        }[n.type] || "var(--text-muted)";

        let actions = "";
        if (n.type === "clan_invite" && !n.read) {
          actions = `<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
            <button class="btn btn-success-custom" style="flex:1;min-width:120px" onclick="respondInvitePage('${n.notification_id}', 'accept', this)">Accept</button>
            <button class="btn btn-ghost"          style="flex:1;min-width:120px" onclick="respondInvitePage('${n.notification_id}', 'decline', this)">Decline</button>
          </div>`;
        }
        if (n.type === "battle_challenge" && !n.read) {
          actions = `<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
            <button class="btn btn-danger-custom"  style="flex:1;min-width:120px" onclick="respondBattlePage('${n.notification_id}', 'accept', this)">Accept Battle</button>
            <button class="btn btn-ghost"          style="flex:1;min-width:120px" onclick="respondBattlePage('${n.notification_id}', 'decline', this)">Decline</button>
          </div>`;
        }

        return `
          <div class="card mb-3 ${n.read ? "" : "unread-card"}" style="border-color:${n.read ? "var(--border)" : "var(--accent)"};padding:0">
            <div style="display:flex;align-items:flex-start;gap:14px;padding:18px 20px">
              <div style="width:40px;height:40px;border-radius:50%;background:rgba(108,99,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <i data-lucide="${typeIcon}" style="width:20px;height:20px;color:${typeColor}"></i>
              </div>
              <div style="flex:1">
                <p style="margin:0;font-size:.95rem;color:var(--text-primary)">${n.message}</p>
                <p style="margin:4px 0 0;font-size:.78rem;color:var(--text-muted)">${timeAgo(n.created_at)}</p>
                ${actions}
              </div>
              ${!n.read ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px"></div>` : ""}
            </div>
          </div>`;
      }).join("");
      window.lucide.createIcons({ root: list });
    }

    async function respondInvitePage(notifId, action, btn) {
      setButtonLoading(btn, true);
      try {
        await apiFetch("/api/clans/respond-invite", "POST", { notification_id: notifId, action });
        showToast(action === "accept" ? "Clan joined!" : "Invite declined", "success");
        await loadNotifications();
      } catch (err) {
        showToast(err.message, "error");
        setButtonLoading(btn, false, action === "accept" ? "Accept" : "Decline");
      }
    }

    async function respondBattlePage(notifId, action, btn) {
      setButtonLoading(btn, true);
      try {
        await apiFetch("/api/battles/respond", "POST", { notification_id: notifId, action });
        showToast(action === "accept" ? "Battle accepted! The war begins." : "Challenge declined.", "success");
        await loadNotifications();
      } catch (err) {
        showToast(err.message, "error");
        setButtonLoading(btn, false, action === "accept" ? "Accept Battle" : "Decline");
      }
    }
  </script>
</body>
</html>
