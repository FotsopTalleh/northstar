<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — XPForge</title>
  <meta name="description" content="Daily, weekly, monthly, yearly and all-time XP leaderboards. See who dominates XPForge." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="/dashboard.html"><i data-lucide="zap" style="display:inline-block; vertical-align:middle; margin-right:4px; margin-top:-4px"></i> XPForge</a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="/dashboard.html" class="nav-link"><i data-lucide="clipboard-list" class="icon-sm"></i> Today</a>
        <a href="/leaderboard.html" class="nav-link active"><i data-lucide="trophy" class="icon-sm"></i> Board</a>
        <a href="/clan.html"        class="nav-link"><i data-lucide="swords" class="icon-sm"></i> Clan</a>
        <a href="/profile.html"     class="nav-link"><i data-lucide="user" class="icon-sm"></i> Profile</a>

        <button class="notif-bell" onclick="toggleTheme()" style="margin-left:8px" title="Toggle Theme">
          <i class="theme-icon" data-lucide="moon" style="width:18px;height:18px"></i>
        </button>

        <div style="position:relative">
          <div class="notif-bell" id="notif-bell"><i data-lucide="bell" style="width:20px;height:20px"></i>
            <span class="notif-badge" id="notif-count" style="display:none">0</span>
          </div>
          <div class="notif-dropdown" id="notif-dropdown">
            <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
              <span style="font-weight:700;font-size:.9rem">Notifications</span>
              <button id="notif-mark-all" class="btn btn-ghost" style="padding:4px 10px;font-size:.75rem">Mark all read</button>
            </div>
            <div id="notif-list"></div>
          </div>
        </div>

        <div id="nav-avatar"></div>
        <span id="nav-username" style="font-weight:600;font-size:.9rem;color:var(--text-secondary)"></span>
        <button class="btn btn-ghost" id="btn-logout" style="padding:6px 14px;font-size:.85rem">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="page-header">
      <h1 style="display:flex;align-items:center;gap:8px"><i data-lucide="trophy" style="width:32px;height:32px;color:var(--gold)"></i> Leaderboards</h1>
      <p>Rankings update in real time as tasks are completed. Finalized every midnight.</p>
    </div>

    <!-- Period Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-daily"   onclick="switchPeriod('daily')"><i data-lucide="calendar" class="icon-sm" style="margin-right:4px"></i> Daily</button>
      <button class="tab-btn"        id="tab-weekly"  onclick="switchPeriod('weekly')"><i data-lucide="calendar-days" class="icon-sm" style="margin-right:4px"></i> Weekly</button>
      <button class="tab-btn"        id="tab-monthly" onclick="switchPeriod('monthly')"><i data-lucide="calendar-range" class="icon-sm" style="margin-right:4px"></i> Monthly</button>
      <button class="tab-btn"        id="tab-yearly"  onclick="switchPeriod('yearly')"><i data-lucide="bar-chart-2" class="icon-sm" style="margin-right:4px"></i> Yearly</button>
      <button class="tab-btn"        id="tab-global"  onclick="switchPeriod('global')"><i data-lucide="globe" class="icon-sm" style="margin-right:4px"></i> All-Time</button>
    </div>

    <!-- Leaderboard content -->
    <div id="lb-container">
      <div class="text-center py-5" style="color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:8px">
        <i data-lucide="hourglass" class="icon-sm"></i> Loading leaderboard…
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/leaderboard.js"></script>
  <script>lucide.createIcons();</script>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav">
    <a href="/dashboard.html" class="mobile-nav-item">
      <i data-lucide="clipboard-list"></i> Today
    </a>
    <a href="/leaderboard.html" class="mobile-nav-item active">
      <i data-lucide="trophy"></i> Board
    </a>
    <a href="/clan.html" class="mobile-nav-item">
      <i data-lucide="swords"></i> Clan
    </a>
    <a href="/profile.html" class="mobile-nav-item">
      <i data-lucide="user"></i> Profile
    </a>
    <button class="mobile-nav-item" onclick="toggleTheme()">
      <i class="theme-icon" data-lucide="moon"></i> Theme
    </button>
  </nav>
</body>
</html>
